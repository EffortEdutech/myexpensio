# FILE PATH: .github/workflows/release.yml

name: Auto Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout with full history ─────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Guard: skip release and artifact commits to prevent infinite loop
      - name: Check for release commit
        id: guard
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "Last commit: $COMMIT_MSG"
          if echo "$COMMIT_MSG" | grep -qE "^chore\(release\)|^chore: release|^chore: update version"; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⏭ Skipping — release or artifact commit."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      # ── 3. Setup pnpm ─────────────────────────────────────────────────────
      #    No version pin — auto-reads from root package.json "packageManager".
      #    Fixes: ERR_PNPM_BAD_PM_VERSION conflict with pnpm@10.x
      - name: Setup pnpm
        if: steps.guard.outputs.skip == 'false'
        uses: pnpm/action-setup@v4

      # ── 4. Setup Node 24 ──────────────────────────────────────────────────
      - name: Setup Node
        if: steps.guard.outputs.skip == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      # ── 5. Install dependencies ───────────────────────────────────────────
      - name: Install dependencies
        if: steps.guard.outputs.skip == 'false'
        run: pnpm install --no-frozen-lockfile

      # ── 6. Configure git identity ─────────────────────────────────────────
      - name: Configure git identity
        if: steps.guard.outputs.skip == 'false'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      # ── 7. Run standard-version from apps/user ────────────────────────────
      #    Bumps apps/user/package.json, generates CHANGELOG.md, creates
      #    release commit + tag. The postrelease script writes version.json
      #    to disk BUT it is not included in the release commit (see step 8).
      - name: Run release (user app)
        if: steps.guard.outputs.skip == 'false'
        working-directory: apps/user
        run: pnpm run release

      # ── 8. Commit version.json ────────────────────────────────────────────
      #    postrelease runs AFTER standard-version's commit, so version.json
      #    is written to disk but never committed. This step fixes that.
      #    Without this, the PWA hook always fetches a stale version.json.
      - name: Commit version.json
        if: steps.guard.outputs.skip == 'false'
        run: |
          git add apps/user/public/version.json
          git diff --staged --quiet \
            && echo "version.json unchanged — nothing to commit" \
            || git commit -m "chore: update version.json"

      # ── 9. Push everything: release commit + version.json commit + tag ────
      #    Vercel detects the push and deploys. next.config.js reads
      #    package.json at build time so NEXT_PUBLIC_APP_VERSION is always
      #    correct without needing .env.production.
      - name: Push changes and tags
        if: steps.guard.outputs.skip == 'false'
        run: git push --follow-tags origin main
