# scan_service/render.yaml
# Render.com free-tier deployment config.
# Repo: push scan_service/ folder to GitHub (can be same myexpensio repo).
# Then connect this file in Render dashboard → New Web Service → select repo.

services:
  - type: web
    name: myexpensio-scan
    runtime: python
    region: singapore          # closest to Malaysia
    plan: free
    rootDir: scan_service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SCAN_API_SECRET
        generateValue: true    # Render auto-generates — copy to Vercel env vars
